name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build, test & package (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Bootstrap (fetch engine, build xcframework, install dictionary)
        run: ./scripts/bootstrap.sh --no-xcodeproj

      - name: Run engine + kit tests
        run: swift test

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      # --- macOS app → unsigned DMG (the signed+notarized DMG is cut locally
      #     with scripts/release.sh, since CI has no Developer ID cert) ---
      - name: Build macOS app (unsigned) → DMG
        run: |
          xcodebuild -project DECtalk.xcodeproj -scheme DECtalkApp-macOS \
            -configuration Release -derivedDataPath build/macos \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" build
          stage="$(mktemp -d)"
          cp -R build/macos/Build/Products/Release/DECtalk.app "$stage/"
          ln -s /Applications "$stage/Applications"
          hdiutil create -volname DECtalk -srcfolder "$stage" -ov -format UDZO \
            "$GITHUB_WORKSPACE/DECtalk-macOS-unsigned.dmg"

      # --- iOS .ipa (unsigned — sign with Sideloadly/AltStore on install) ---
      - name: Build iOS app (unsigned) → .ipa
        run: |
          xcodebuild -project DECtalk.xcodeproj -scheme DECtalkApp-iOS \
            -configuration Release -sdk iphoneos -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" build
          mkdir -p payload/Payload
          cp -R build/ios/Build/Products/Release-iphoneos/DECtalk.app payload/Payload/
          (cd payload && zip -qry "$GITHUB_WORKSPACE/DECtalk-iOS-unsigned.ipa" Payload)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DECtalk-builds
          path: |
            DECtalk-macOS-unsigned.dmg
            DECtalk-iOS-unsigned.ipa
